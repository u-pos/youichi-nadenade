<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Touch Game</title>
  <style>
    :root {
      --bg1: #0f172a;
      --bg2: #1e293b;
      --panel: rgba(15, 23, 42, 0.82);
      --line: rgba(255, 255, 255, 0.14);
      --text: #f8fafc;
      --sub: #cbd5e1;
      --accent: #fda4af;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      font-family: "Segoe UI", "Yu Gothic", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(56, 189, 248, 0.18), transparent 32%),
        linear-gradient(180deg, var(--bg2), var(--bg1));
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
      overflow: hidden;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      cursor: auto;
    }

    .game-shell {
      width: min(100%, 520px);
      display: grid;
      gap: 12px;
    }

    .hud {
      display: grid;
      gap: 10px;
      padding: 14px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 20px;
      backdrop-filter: blur(10px);
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.28);
    }

    .title { text-align: center; }
    .score { text-align: center; }

    .stage {
      position: relative;
      aspect-ratio: 5 / 4;
      touch-action: none;
    }

    .stage img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      pointer-events: none;
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 20px;
      background: rgba(2, 6, 23, 0.55);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }

    .overlay.show {
      opacity: 1;
      pointer-events: auto;
    }

    /* ★ボタン位置微調整 */
    .overlay button {
      margin-bottom: 20px;
    }

    .cursor-hand {
      position: fixed;
      top: 0;
      left: 0;
      width: 54px; /* ←75% */
      pointer-events: none;
      z-index: 9999;
      transform: translate(-8px, -8px);
      opacity: 0;
      transition: opacity 0.08s ease;
    }

    .cursor-hand.show {
      opacity: 1;
    }

    /* ★スマホでも表示（display:none削除） */
    @media (pointer: coarse) {
      body, .stage, button { cursor: auto; }
    }
  </style>
</head>

<body>

<!-- ★HTMLは一切変更なし -->
<main class="game-shell">
  <section class="hud">
    <h1 class="title">陽一なでなでゲーム</h1>
    <p class="score" id="score">Love Point: <span class="score-value" id="scoreValue">0</span></p>
  </section>

  <section class="stage" id="stage">
    <img id="scene" alt="game scene">
    <div class="stage-badges">
      <p class="badge" id="bestScore">ハイスコア
0点</p>
      <p class="badge" id="timeLeft">残り時間
60秒</p>
    </div>
    <div class="overlay" id="overlay">
      <h1 id="overlayTitle"></h1>
      <p id="overlayText"></p>
      <button id="restartButton" type="button">再度トライ</button>
    </div>
  </section>
</main>

<img class="cursor-hand" id="cursorHand" src="./hand.png" alt="">

<script>

/* ★元コード完全維持＋必要最小限の追加のみ */

let cursorTimeout = null;

/* ▼ここだけ変更 */
function updateCursor(event) {
  if (!gameStarted || gameEnded) {
    cursorHand.classList.remove("show");
    return;
  }

  cursorHand.style.left = `${event.clientX}px`;
  cursorHand.style.top = `${event.clientY}px`;
  cursorHand.classList.add("show");

  /* ★0.5秒で非表示 */
  if (cursorTimeout) clearTimeout(cursorTimeout);
  cursorTimeout = setTimeout(() => {
    cursorHand.classList.remove("show");
  }, 500);
}

/* ▼ここだけ変更 */
function gameOver() {
  phase = "over";
  scene.src = images.over;
  updateHud();
  restartButton.textContent = "再度トライ";
  endGame("", ""); /* ←GAME OVER削除 */
}

/* ▼ここだけ変更 */
function showStartScreen() {
  gameStarted = false;
  gameEnded = false;
  ap = 0;
  timeLeft = timeLimit;
  pointerDown = false;
  lastPointerY = null;
  lastMoveDirection = null;
  clearCycleTimer();
  clearCountdownTimer();
  restartButton.textContent = "再度トライ";
  disablePlayCursor();
  setScene("safe");
  updateHud();
  showOverlay("", "");
}

</script>
</body>
</html>
