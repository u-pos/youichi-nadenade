<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Touch Game</title>
  <style>
    :root {
      --bg1: #0f172a;
      --bg2: #1e293b;
      --panel: rgba(15, 23, 42, 0.82);
      --line: rgba(255, 255, 255, 0.14);
      --text: #f8fafc;
      --sub: #cbd5e1;
      --safe: #22c55e;
      --warn: #f59e0b;
      --danger: #ef4444;
      --accent: #38bdf8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      font-family: "Segoe UI", "Yu Gothic", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(56, 189, 248, 0.18), transparent 32%),
        linear-gradient(180deg, var(--bg2), var(--bg1));
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
      overflow: hidden;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    .game-shell {
      width: min(100%, 520px);
      display: grid;
      gap: 12px;
    }

    .hud {
      display: grid;
      gap: 10px;
      padding: 14px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 20px;
      backdrop-filter: blur(10px);
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.28);
    }

    .top-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .score {
      font-size: 1.1rem;
      font-weight: 800;
      letter-spacing: 0.04em;
    }

    .status {
      padding: 6px 12px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.08);
      font-size: 0.9rem;
      font-weight: 700;
    }

    .status.safe { color: #bbf7d0; }
    .status.warning { color: #fde68a; }
    .status.watch { color: #fecaca; }
    .status.clear { color: #bae6fd; }
    .status.over { color: #fecaca; }

    .meter {
      width: 100%;
      height: 14px;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.1);
    }

    .meter-fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, var(--safe), var(--accent));
      transition: width 0.12s linear;
    }

    .help {
      margin: 0;
      color: var(--sub);
      font-size: 0.92rem;
      line-height: 1.5;
    }

    .stage {
      position: relative;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: rgba(2, 6, 23, 0.75);
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.35);
      aspect-ratio: 5 / 4;
      touch-action: none;
    }

    .stage img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
      background: #0b1120;
      pointer-events: none;
    }

    .flash {
      position: absolute;
      inset: 0;
      background: transparent;
      pointer-events: none;
      transition: background 0.12s ease;
    }

    .flash.active {
      background: rgba(255, 255, 255, 0.14);
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 20px;
      background: rgba(2, 6, 23, 0.55);
      text-align: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }

    .overlay.show {
      opacity: 1;
      pointer-events: auto;
    }

    .overlay h1 {
      margin: 0;
      font-size: clamp(1.6rem, 5vw, 2.4rem);
      line-height: 1.1;
      text-shadow: 0 3px 12px rgba(0, 0, 0, 0.45);
    }

    .overlay p {
      margin: 0;
      color: #e2e8f0;
      line-height: 1.5;
    }

    button {
      appearance: none;
      border: 0;
      border-radius: 999px;
      padding: 12px 18px;
      font: inherit;
      font-weight: 800;
      color: #08111f;
      background: linear-gradient(180deg, #f8fafc, #cbd5e1);
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.28);
      cursor: pointer;
    }
  </style>
</head>
<body>
  <main class="game-shell">
    <section class="hud">
      <div class="top-row">
        <div class="score" id="score">AP 0 / 100</div>
        <div class="status safe" id="status">SAFE</div>
      </div>
      <div class="meter">
        <div class="meter-fill" id="meterFill"></div>
      </div>
      <p class="help">
        Swipe on the head, body, or hips to gain 5 AP per stroke.
        Stop touching during WARNING or WATCH or the game ends instantly.
      </p>
    </section>

    <section class="stage" id="stage">
      <img id="scene" alt="game scene">
      <div class="flash" id="flash"></div>
      <div class="overlay" id="overlay">
        <h1 id="overlayTitle"></h1>
        <p id="overlayText"></p>
        <button id="restartButton" type="button">RESTART</button>
      </div>
    </section>
  </main>

  <script>
    const images = {
      safe: "1.jpg",
      warning: "2.jpg",
      watch: "3.jpg",
      over: "4.jpg"
    };

    const goal = 100;

    const stateLabels = {
      safe: "SAFE",
      warning: "WARNING",
      watch: "WATCH",
      clear: "CLEAR",
      over: "GAME OVER"
    };

    const scene = document.getElementById("scene");
    const stage = document.getElementById("stage");
    const statusEl = document.getElementById("status");
    const scoreEl = document.getElementById("score");
    const meterFill = document.getElementById("meterFill");
    const overlay = document.getElementById("overlay");
    const overlayTitle = document.getElementById("overlayTitle");
    const overlayText = document.getElementById("overlayText");
    const restartButton = document.getElementById("restartButton");
    const flash = document.getElementById("flash");

    let ap = 0;
    let phase = "safe";
    let timer = null;
    let pointerDown = false;
    let strokeCounted = false;
    let flashTimer = null;

    const hitZones = [
      { cx: 0.55, cy: 0.20, rx: 0.09, ry: 0.08 },
      { cx: 0.57, cy: 0.56, rx: 0.17, ry: 0.22 },
      { cx: 0.60, cy: 0.76, rx: 0.13, ry: 0.10 }
    ];

    function updateHud() {
      scoreEl.textContent = `AP ${ap} / ${goal}`;
      meterFill.style.width = `${Math.min(ap, goal)}%`;
      statusEl.textContent = stateLabels[phase];
      statusEl.className = `status ${phase}`;
    }

    function showOverlay(title, text) {
      overlayTitle.textContent = title;
      overlayText.textContent = text;
      overlay.classList.add("show");
    }

    function hideOverlay() {
      overlay.classList.remove("show");
    }

    function setScene(nextPhase) {
      phase = nextPhase;
      scene.src = images[nextPhase] || images.safe;
      updateHud();
    }

    function clearCycleTimer() {
      if (timer) {
        clearTimeout(timer);
        timer = null;
      }
    }

    function triggerFlash() {
      flash.classList.add("active");
      clearTimeout(flashTimer);
      flashTimer = setTimeout(() => {
        flash.classList.remove("active");
      }, 120);
    }

    function gameClear() {
      clearCycleTimer();
      phase = "clear";
      scene.src = images.safe;
      updateHud();
      showOverlay("CLEAR", "AP reached 100.");
    }

    function gameOver() {
      clearCycleTimer();
      phase = "over";
      scene.src = images.over;
      updateHud();
      showOverlay("GAME OVER", "You touched during the watch phase.");
    }

    function nextCycle() {
      clearCycleTimer();

      if (phase === "safe") {
        timer = setTimeout(() => {
          setScene("warning");
          nextCycle();
        }, 4000 + Math.random() * 3000);
        return;
      }

      if (phase === "warning") {
        timer = setTimeout(() => {
          setScene("watch");
          nextCycle();
        }, 1000);
        return;
      }

      if (phase === "watch") {
        timer = setTimeout(() => {
          setScene("safe");
          nextCycle();
        }, 2000);
      }
    }

    function pointInZones(clientX, clientY) {
      const rect = stage.getBoundingClientRect();
      const x = (clientX - rect.left) / rect.width;
      const y = (clientY - rect.top) / rect.height;

      return hitZones.some((zone) => {
        const dx = (x - zone.cx) / zone.rx;
        const dy = (y - zone.cy) / zone.ry;
        return dx * dx + dy * dy <= 1;
      });
    }

    function handleStroke(event) {
      if (!pointerDown || strokeCounted || phase === "clear" || phase === "over") {
        return;
      }

      if (!pointInZones(event.clientX, event.clientY)) {
        return;
      }

      strokeCounted = true;

      if (phase === "warning" || phase === "watch") {
        gameOver();
        return;
      }

      ap += 5;
      triggerFlash();
      updateHud();

      if (ap >= goal) {
        gameClear();
      }
    }

    function endStroke() {
      pointerDown = false;
      strokeCounted = false;
    }

    function startGame() {
      ap = 0;
      pointerDown = false;
      strokeCounted = false;
      hideOverlay();
      setScene("safe");
      nextCycle();
    }

    stage.addEventListener("pointerdown", (event) => {
      if (phase === "clear" || phase === "over") {
        return;
      }

      pointerDown = true;
      strokeCounted = false;
      handleStroke(event);
    });

    stage.addEventListener("pointermove", handleStroke);
    stage.addEventListener("pointerup", endStroke);
    stage.addEventListener("pointercancel", endStroke);
    stage.addEventListener("pointerleave", endStroke);
    scene.addEventListener("dragstart", (event) => event.preventDefault());
    restartButton.addEventListener("click", startGame);

    startGame();
  </script>
</body>
</html>
