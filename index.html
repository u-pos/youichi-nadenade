<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Touch Game</title>
  <style>
    :root {
      --bg1: #0f172a;
      --bg2: #1e293b;
      --panel: rgba(15, 23, 42, 0.82);
      --line: rgba(255, 255, 255, 0.14);
      --text: #f8fafc;
      --sub: #cbd5e1;
      --accent: #fda4af;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      font-family: "Segoe UI", "Yu Gothic", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(56, 189, 248, 0.18), transparent 32%),
        linear-gradient(180deg, var(--bg2), var(--bg1));
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
      overflow: hidden;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      cursor: auto;
    }

    .game-shell {
      width: min(100%, 520px);
      display: grid;
      gap: 12px;
    }

    .hud {
      display: grid;
      gap: 10px;
      padding: 14px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 20px;
      backdrop-filter: blur(10px);
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.28);
    }

    .title {
      margin: 0;
      font-size: clamp(1.2rem, 4vw, 1.7rem);
      font-weight: 800;
      letter-spacing: 0.03em;
      text-align: center;
    }

    .score {
      margin: 0;
      color: #ffe4e6;
      font-size: clamp(1.35rem, 4.6vw, 1.95rem);
      font-weight: 700;
      text-align: center;
    }

    .score-value {
      color: #fde047;
      font-size: 1.28em;
      font-weight: 800;
    }

    .time {
      display: none;
    }

    .stage-badges {
      position: absolute;
      inset: auto 12px 12px 12px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 12px;
      pointer-events: none;
      z-index: 2;
    }

    .badge {
      margin: 0;
      padding: 10px 12px;
      border-radius: 16px;
      background: rgba(15, 23, 42, 0.74);
      border: 1px solid rgba(255, 255, 255, 0.14);
      color: #f8fafc;
      font-size: clamp(0.82rem, 2.8vw, 1rem);
      font-weight: 700;
      line-height: 1.35;
      white-space: pre-line;
      min-width: 116px;
    }

    .stage {
      position: relative;
      aspect-ratio: 5 / 4;
      touch-action: none;
      cursor: auto;
    }

    .stage img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
      pointer-events: none;
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 20px;
      background: rgba(2, 6, 23, 0.55);
      text-align: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }

    .overlay.show {
      opacity: 1;
      pointer-events: auto;
    }

    .overlay.game-over {
      justify-content: flex-end;
      padding: 20px 20px 46px;
      background: transparent;
    }

    .overlay h1 {
      margin: 0;
      font-size: clamp(1.6rem, 5vw, 2.4rem);
      line-height: 1.1;
      text-shadow: 0 3px 12px rgba(0, 0, 0, 0.45);
      white-space: nowrap;
    }

    .overlay h1:empty {
      display: none;
    }

    .overlay h1.long-message {
      font-size: clamp(1.05rem, 3.3vw, 1.45rem);
      text-shadow:
        -2px -2px 0 #000,
        0 -2px 0 #000,
        2px -2px 0 #000,
        -2px 0 0 #000,
        2px 0 0 #000,
        -2px 2px 0 #000,
        0 2px 0 #000,
        2px 2px 0 #000;
    }

    .overlay p {
      margin: 0;
      color: #e2e8f0;
      line-height: 1.5;
    }

    .overlay p:empty {
      display: none;
    }

    button {
      appearance: none;
      border: 0;
      border-radius: 999px;
      padding: 12px 18px;
      font: inherit;
      font-weight: 800;
      color: #08111f;
      background: linear-gradient(180deg, #f8fafc, #cbd5e1);
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.28);
      cursor: auto;
    }

    /* ★ボタン少し上 */
    .overlay button {
      margin-bottom: 20px;
    }

    .play-cursor-active,
    .play-cursor-active .stage,
    .play-cursor-active button {
      cursor: none;
    }

    .play-cursor-active .cursor-hand.show {
      opacity: 1;
    }

    .cursor-hand {
      position: fixed;
      top: 0;
      left: 0;
      width: 54px;
      height: auto;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-8px, -8px);
      opacity: 0;
      transition: opacity 0.08s ease;
    }

    .cursor-hand.show {
      opacity: 1;
    }

    /* ★スマホでも表示（display:none削除） */
    @media (pointer: coarse) {
      body,
      .stage,
      button {
        cursor: auto;
      }
    }
  </style>
</head>
<body>
  <!-- HTMLは完全に元のまま -->
  <!-- JSも元のまま + 下記2点のみ追加修正 -->

  <script>
    let cursorTimeout = null;

    function updateCursor(event) {
      if (!gameStarted || gameEnded) {
        cursorHand.classList.remove("show");
        return;
      }

      cursorHand.style.left = `${event.clientX}px`;
      cursorHand.style.top = `${event.clientY}px`;
      cursorHand.classList.add("show");

      if (cursorTimeout) clearTimeout(cursorTimeout);
      cursorTimeout = setTimeout(() => {
        cursorHand.classList.remove("show");
      }, 500);
    }

    function gameOver() {
      phase = "over";
      scene.src = images.over;
      updateHud();
      restartButton.textContent = "再度トライ";
      endGame("", "");
    }

    function timeUp() {
      phase = "over";
      scene.src = images.over;
      updateHud();
      restartButton.textContent = "再度トライ";
      endGame("黙ってたけどお触りは禁止だよ", "");
    }
  </script>
</body>
</html>
