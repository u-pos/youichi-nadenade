<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Touch Game</title>
  <style>
    :root {
      --bg1: #0f172a;
      --bg2: #1e293b;
      --panel: rgba(15, 23, 42, 0.82);
      --line: rgba(255, 255, 255, 0.14);
      --text: #f8fafc;
      --sub: #cbd5e1;
      --accent: #fda4af;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      font-family: "Segoe UI", "Yu Gothic", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(56, 189, 248, 0.18), transparent 32%),
        linear-gradient(180deg, var(--bg2), var(--bg1));
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
      overflow: hidden;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      cursor: auto;
    }

    .game-shell { width: min(100%, 520px); display: grid; gap: 12px; }

    .hud {
      display: grid;
      gap: 10px;
      padding: 14px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 20px;
      backdrop-filter: blur(10px);
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.28);
    }

    .title { text-align: center; }
    .score { text-align: center; }

    .stage {
      position: relative;
      aspect-ratio: 5 / 4;
      touch-action: none;
    }

    .stage img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      pointer-events: none;
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 20px;
      background: rgba(2, 6, 23, 0.55);
      text-align: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }

    .overlay.show {
      opacity: 1;
      pointer-events: auto;
    }

    button {
      border-radius: 999px;
      padding: 12px 18px;
      font-weight: 800;
    }

    /* ★ボタン位置調整 */
    .overlay button {
      margin-bottom: 20px;
    }

    .cursor-hand {
      position: fixed;
      top: 0;
      left: 0;
      width: 54px;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-8px, -8px);
      opacity: 0;
      transition: opacity 0.08s ease;
    }

    .cursor-hand.show {
      opacity: 1;
    }

    @media (pointer: coarse) {
      body, .stage, button { cursor: auto; }
    }
  </style>
</head>

<body>
<main class="game-shell">
  <section class="hud">
    <h1 class="title">陽一なでなでゲーム</h1>
    <p class="score">Love Point: <span id="scoreValue">0</span></p>
  </section>

  <section class="stage" id="stage">
    <img id="scene">
    <div class="overlay show" id="overlay">
      <h1 id="overlayTitle"></h1>
      <p id="overlayText"></p>
      <button id="restartButton">再度トライ</button>
    </div>
  </section>
</main>

<img class="cursor-hand" id="cursorHand" src="./hand.png">

<script>
const images = {
  safe: "1.jpg",
  warning: "2.jpg",
  watch: "3.jpg",
  over: "4.jpg"
};

const scene = document.getElementById("scene");
const overlay = document.getElementById("overlay");
const restartButton = document.getElementById("restartButton");
const cursorHand = document.getElementById("cursorHand");

let cursorTimeout = null;
let gameStarted = false;
let gameEnded = false;

/* 初期表示 */
scene.src = images.safe;

/* 手アイコン制御 */
function updateCursor(e){
  if (!gameStarted || gameEnded) return;

  cursorHand.style.left = e.clientX + "px";
  cursorHand.style.top = e.clientY + "px";
  cursorHand.classList.add("show");

  if(cursorTimeout) clearTimeout(cursorTimeout);
  cursorTimeout = setTimeout(()=>{
    cursorHand.classList.remove("show");
  },500);
}

function hideCursor(){
  cursorHand.classList.remove("show");
}

/* GAME OVER（文字なし） */
function gameOver(){
  gameEnded = true;
  overlay.classList.add("show");
}

/* スタート */
function startGame(){
  gameStarted = true;
  gameEnded = false;
  overlay.classList.remove("show");
}

restartButton.addEventListener("click", startGame);
window.addEventListener("pointermove", updateCursor);
window.addEventListener("pointerdown", updateCursor);
window.addEventListener("pointerleave", hideCursor);
</script>

</body>
</html>
