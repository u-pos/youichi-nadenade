<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Touch Game</title>
  <style>
    :root {
      --bg1: #0f172a;
      --bg2: #1e293b;
      --panel: rgba(15, 23, 42, 0.82);
      --line: rgba(255, 255, 255, 0.14);
      --text: #f8fafc;
      --sub: #cbd5e1;
      --accent: #fda4af;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      font-family: "Segoe UI", "Yu Gothic", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(56, 189, 248, 0.18), transparent 32%),
        linear-gradient(180deg, var(--bg2), var(--bg1));
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
      overflow: hidden;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      cursor: url("hand.png") 16 16, auto;
    }

    .game-shell {
      width: min(100%, 520px);
      display: grid;
      gap: 12px;
    }

    .hud {
      display: grid;
      gap: 10px;
      padding: 14px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 20px;
      backdrop-filter: blur(10px);
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.28);
    }

    .title {
      margin: 0;
      font-size: clamp(1.2rem, 4vw, 1.7rem);
      font-weight: 800;
      letter-spacing: 0.03em;
      text-align: center;
    }

    .score {
      margin: 0;
      color: #ffe4e6;
      font-size: 1.1rem;
      font-weight: 700;
      text-align: center;
    }

    .stage {
      position: relative;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: rgba(2, 6, 23, 0.75);
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.35);
      aspect-ratio: 5 / 4;
      touch-action: none;
      cursor: url("hand.png") 16 16, auto;
    }

    .stage img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
      background: #0b1120;
      pointer-events: none;
    }

    .flash {
      position: absolute;
      inset: 0;
      background: transparent;
      pointer-events: none;
      transition: background 0.12s ease;
    }

    .flash.active {
      background: rgba(255, 255, 255, 0.14);
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 20px;
      background: rgba(2, 6, 23, 0.55);
      text-align: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }

    .overlay.show {
      opacity: 1;
      pointer-events: auto;
    }

    .overlay.game-over {
      justify-content: flex-end;
      padding: 20px 20px 28px;
      background: transparent;
    }

    .overlay h1 {
      margin: 0;
      font-size: clamp(1.6rem, 5vw, 2.4rem);
      line-height: 1.1;
      text-shadow: 0 3px 12px rgba(0, 0, 0, 0.45);
    }

    .overlay p {
      margin: 0;
      color: #e2e8f0;
      line-height: 1.5;
    }

    .overlay p:empty {
      display: none;
    }

    button {
      appearance: none;
      border: 0;
      border-radius: 999px;
      padding: 12px 18px;
      font: inherit;
      font-weight: 800;
      color: #08111f;
      background: linear-gradient(180deg, #f8fafc, #cbd5e1);
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.28);
      cursor: pointer;
    }
  </style>
</head>
<body>
  <main class="game-shell">
    <section class="hud">
      <h1 class="title">陽一なでなでゲーム</h1>
      <p class="score" id="score">Love Point: 0</p>
    </section>

    <section class="stage" id="stage">
      <img id="scene" alt="game scene">
      <div class="flash" id="flash"></div>
      <div class="overlay" id="overlay">
        <h1 id="overlayTitle"></h1>
        <p id="overlayText"></p>
        <button id="restartButton" type="button">RESTART</button>
      </div>
    </section>
  </main>

  <script>
    const images = {
      safe: "1.jpg",
      warning: "2.jpg",
      watch: "3.jpg",
      over: "4.jpg"
    };

    const scene = document.getElementById("scene");
    const stage = document.getElementById("stage");
    const scoreEl = document.getElementById("score");
    const overlay = document.getElementById("overlay");
    const overlayTitle = document.getElementById("overlayTitle");
    const overlayText = document.getElementById("overlayText");
    const restartButton = document.getElementById("restartButton");
    const flash = document.getElementById("flash");

    let ap = 0;
    let phase = "safe";
    let timer = null;
    let pointerDown = false;
    let flashTimer = null;
    let lastPointerY = null;
    let lastMoveDirection = null;
    const moveThreshold = 12;

    const hitZones = [
      { cx: 0.55, cy: 0.20, rx: 0.09, ry: 0.08 },
      { cx: 0.57, cy: 0.56, rx: 0.17, ry: 0.22 },
      { cx: 0.60, cy: 0.76, rx: 0.13, ry: 0.10 }
    ];

    function updateHud() {
      scoreEl.textContent = `Love Point: ${ap}`;
    }

    function showOverlay(title, text) {
      overlayTitle.textContent = title;
      overlayText.textContent = text;
      overlay.classList.toggle("game-over", phase === "over");
      overlay.classList.add("show");
    }

    function hideOverlay() {
      overlay.classList.remove("game-over");
      overlay.classList.remove("show");
    }

    function setScene(nextPhase) {
      phase = nextPhase;
      scene.src = images[nextPhase] || images.safe;
      updateHud();
    }

    function clearCycleTimer() {
      if (timer) {
        clearTimeout(timer);
        timer = null;
      }
    }

    function triggerFlash() {
      flash.classList.add("active");
      clearTimeout(flashTimer);
      flashTimer = setTimeout(() => {
        flash.classList.remove("active");
      }, 120);
    }

    function gameOver() {
      clearCycleTimer();
      phase = "over";
      scene.src = images.over;
      updateHud();
      showOverlay("GAME OVER", "");
    }

    function nextCycle() {
      clearCycleTimer();

      if (phase === "safe") {
        timer = setTimeout(() => {
          setScene("warning");
          nextCycle();
        }, 4000 + Math.random() * 3000);
        return;
      }

      if (phase === "warning") {
        timer = setTimeout(() => {
          setScene("watch");
          nextCycle();
        }, 2000);
        return;
      }

      if (phase === "watch") {
        timer = setTimeout(() => {
          setScene("safe");
          nextCycle();
        }, 2000);
      }
    }

    function pointInZones(clientX, clientY) {
      const rect = stage.getBoundingClientRect();
      const x = (clientX - rect.left) / rect.width;
      const y = (clientY - rect.top) / rect.height;

      return hitZones.some((zone) => {
        const dx = (x - zone.cx) / zone.rx;
        const dy = (y - zone.cy) / zone.ry;
        return dx * dx + dy * dy <= 1;
      });
    }

    function addAp(amount) {
      ap += amount;
      triggerFlash();
      updateHud();
    }

    function handlePointerDown(event) {
      if (phase === "over") {
        return;
      }

      pointerDown = true;
      lastPointerY = event.clientY;
      lastMoveDirection = null;

      if (!pointInZones(event.clientX, event.clientY)) {
        return;
      }

      if (phase === "warning" || phase === "watch") {
        gameOver();
      }
    }

    function handlePointerMove(event) {
      if (!pointerDown || phase === "over") {
        return;
      }

      if (lastPointerY === null) {
        lastPointerY = event.clientY;
        return;
      }

      const deltaY = event.clientY - lastPointerY;

      if (Math.abs(deltaY) < moveThreshold) {
        return;
      }

      lastPointerY = event.clientY;

      if (!pointInZones(event.clientX, event.clientY)) {
        return;
      }

      const direction = deltaY > 0 ? "down" : "up";

      if (phase === "warning" || phase === "watch") {
        gameOver();
        return;
      }

      if (direction !== lastMoveDirection) {
        lastMoveDirection = direction;
        addAp(1);
      }
    }

    function endStroke() {
      pointerDown = false;
      lastPointerY = null;
      lastMoveDirection = null;
    }

    function startGame() {
      ap = 0;
      pointerDown = false;
      lastPointerY = null;
      lastMoveDirection = null;
      hideOverlay();
      setScene("safe");
      nextCycle();
    }

    stage.addEventListener("pointerdown", handlePointerDown);
    stage.addEventListener("pointermove", handlePointerMove);
    stage.addEventListener("pointerup", endStroke);
    stage.addEventListener("pointercancel", endStroke);
    stage.addEventListener("pointerleave", endStroke);
    scene.addEventListener("dragstart", (event) => event.preventDefault());
    restartButton.addEventListener("click", startGame);

    startGame();
  </script>
</body>
</html>
