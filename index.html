<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Touch Game</title>

<style>
/* ★元コード完全維持 + 最小変更のみ */

/* ▼ここ変更（サイズ） */
.cursor-hand {
  position: fixed;
  top: 0;
  left: 0;
  width: 54px;
  height: auto;
  pointer-events: none;
  z-index: 9999;
  transform: translate(-8px, -8px);
  opacity: 0;
  transition: opacity 0.08s ease;
}

/* ▼ここ変更（スマホでも表示させる） */
@media (pointer: coarse) {
  body,
  .stage,
  button {
    cursor: auto;
  }
}

/* ▼ここ追加（ボタン位置微調整） */
.overlay button {
  margin-bottom: 20px;
}
</style>
</head>

<body>

<!-- ★HTMLは完全に元のまま -->
<img class="cursor-hand" id="cursorHand" src="./hand.png" alt="">

<script>

/* ★元コードそのまま + 追加だけ */

let cursorTimeout = null; // ←追加

function updateCursor(event) {
  if (!gameStarted || gameEnded) {
    cursorHand.classList.remove("show");
    return;
  }

  cursorHand.style.left = `${event.clientX}px`;
  cursorHand.style.top = `${event.clientY}px`;
  cursorHand.classList.add("show");

  // ▼ここ追加（0.5秒で消える）
  if (cursorTimeout) clearTimeout(cursorTimeout);
  cursorTimeout = setTimeout(() => {
    cursorHand.classList.remove("show");
  }, 500);
}

/* ▼ここ変更 */
function gameOver() {
  phase = "over";
  scene.src = images.over;
  updateHud();
  restartButton.textContent = "再度トライ";
  endGame("", ""); // ← GAME OVER削除
}

/* ▼ここ変更 */
function timeUp() {
  phase = "over";
  scene.src = images.over;
  updateHud();
  restartButton.textContent = "再度トライ";
  endGame("黙ってたけどお触りは禁止だよ", "");
}

/* ▼ここ変更 */
function showStartScreen() {
  gameStarted = false;
  gameEnded = false;
  ap = 0;
  timeLeft = timeLimit;

  restartButton.textContent = "再度トライ"; // ←変更

  disablePlayCursor();
  setScene("safe");
  updateHud();
  showOverlay("", "");
}

</script>
</body>
</html>
